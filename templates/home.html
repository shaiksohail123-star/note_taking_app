<!DOCTYPE html>
<html>
<head>
    <title>Note Taking App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">📝 My Notes</h1>

    <!-- Form -->
    <form method="POST" class="d-flex gap-2 mb-4">
        <input type="text" name="note" class="form-control" placeholder="Enter a note">
        <button type="submit" class="btn btn-primary">Add</button>
    </form>

    <!-- Notes List -->
    <ul class="list-group">
        {% for note in notes %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ note[1] }}
                <a href="/edit/{{ note[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ note[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </li>
        {% endfor %}
        {% if not notes %}
    <p class="text-center text-muted mt-3">No notes yet...</p>
{% endif %}
    </ul>

</div>

</body>
</html>
